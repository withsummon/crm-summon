name: Build, Push, and Deploy CRM

on:
  push:
    branches:
      - main

env:
  REGISTRY_URL: registry.withsummon.com
  WORKER_IMAGE: summon-crm-worker
  NGINX_IMAGE: summon-crm-nginx

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.WORKER_IMAGE }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          target: nginx
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.NGINX_IMAGE }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.NGINX_IMAGE }}:${{ github.sha }}

      - name: Trigger Dokploy redeploy
        run: |
          curl -fsSL -X POST "https://dokploy.withsummon.com/api/compose.redeploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -d "{\"composeId\":\"${{ secrets.DOKPLOY_COMPOSE_ID }}\"}"
