name: crm-services

services:
  mariadb:
    image: mariadb:10.6
    restart: always

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mariadb-data:/var/lib/mysql

    networks:
      - crm-network

  redis:
    image: redis:alpine
    restart: always

    volumes:
      - redis-data:/data

    networks:
      - crm-network

volumes:
  mariadb-data:
  redis-data:

networks:
  crm-network:
    external: true
