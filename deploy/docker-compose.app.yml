name: crm-app

x-worker-image: &worker_image registry.withsummon.com/summon-crm-worker:latest
x-nginx-image: &nginx_image registry.withsummon.com/summon-crm-nginx:latest

x-common-env: &common_env
  DB_HOST: mariadb
  DB_PORT: "3306"
  REDIS_CACHE: redis://redis:6379/1
  REDIS_QUEUE: redis://redis:6379/2
  REDIS_SOCKETIO: redis://redis:6379/3

x-common-volumes: &common_volumes
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs

services:
  configurator:
    image: *worker_image
    pull_policy: always
    restart: "no"
    command: ["bash", "-lc", "/home/frappe/frappe-bench/configurator.py"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

  backend:
    image: *worker_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
    command: ["bash", "-lc", "until [ -f /home/frappe/frappe-bench/sites/common_site_config.json ] && grep -q '^frappe$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^erpnext$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^crm$' /home/frappe/frappe-bench/sites/apps.txt; do echo waiting for configurator...; sleep 2; done; exec bench serve --port 8000 --interface 0.0.0.0"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

  frontend:
    image: *nginx_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
      - backend
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: crm.withsummon.com
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
    expose:
      - "8080"
    volumes: *common_volumes
    networks:
      - crm-network

  websocket:
    image: *worker_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
    command: ["bash", "-lc", "until [ -f /home/frappe/frappe-bench/sites/common_site_config.json ] && grep -q '^frappe$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^erpnext$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^crm$' /home/frappe/frappe-bench/sites/apps.txt; do echo waiting for configurator...; sleep 2; done; exec node /home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

  queue-default:
    image: *worker_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
    command: ["bash", "-lc", "until [ -f /home/frappe/frappe-bench/sites/common_site_config.json ] && grep -q '^frappe$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^erpnext$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^crm$' /home/frappe/frappe-bench/sites/apps.txt; do echo waiting for configurator...; sleep 2; done; exec bench worker --queue default,short"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

  queue-long:
    image: *worker_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
    command: ["bash", "-lc", "until [ -f /home/frappe/frappe-bench/sites/common_site_config.json ] && grep -q '^frappe$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^erpnext$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^crm$' /home/frappe/frappe-bench/sites/apps.txt; do echo waiting for configurator...; sleep 2; done; exec bench worker --queue long"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

  schedule:
    image: *worker_image
    pull_policy: always
    restart: on-failure
    depends_on:
      - configurator
    command: ["bash", "-lc", "until [ -f /home/frappe/frappe-bench/sites/common_site_config.json ] && grep -q '^frappe$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^erpnext$' /home/frappe/frappe-bench/sites/apps.txt && grep -q '^crm$' /home/frappe/frappe-bench/sites/apps.txt; do echo waiting for configurator...; sleep 2; done; exec bench schedule"]
    environment:
      <<: *common_env
    volumes: *common_volumes
    networks:
      - crm-network

volumes:
  sites:
  logs:

networks:
  crm-network:
    external: true
