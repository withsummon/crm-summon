name: crm-services

services:
  mariadb:
    image: mariadb:10.6
    restart: always

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mariadb-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      crm-network:
        aliases:
          - mariadb

  redis:
    image: redis:alpine
    restart: always

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      crm-network:
        aliases:
          - redis

volumes:
  mariadb-data:
  redis-data:

networks:
  crm-network:
    external: true
